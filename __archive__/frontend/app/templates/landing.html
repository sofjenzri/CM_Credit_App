<div class="landing-wrapper">
  <div class="landing-welcome">
    <h2>Bienvenue</h2>
    <p>Sélectionnez votre espace pour continuer.</p>
  </div>

  <div class="landing-cards">
    <!-- Espace Client -->
    <div class="landing-card landing-card--client" ng-click="goToClient()">
      <div class="landing-card__icon">🏦</div>
      <div class="landing-card__content">
        <h3>Espace Client</h3>
        <p>Consultez vos comptes, soldes et produits bancaires. Faites une demande de crédit en ligne.</p>
      </div>
      <div class="landing-card__arrow">→</div>
    </div>

    <!-- Espace Employé -->
    <div class="landing-card landing-card--employee" ng-click="goToEmployee()">
      <div class="landing-card__icon">💼</div>
      <div class="landing-card__content">
        <h3>Espace Employé</h3>
        <p>Accédez à la liste des dossiers de crédit en cours et consultez les détails de chaque dossier.</p>
      </div>
      <div class="landing-card__arrow">→</div>
    </div>
  </div>
</div>
